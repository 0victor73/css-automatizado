<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerador CSS Holyrics - Minimalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            overflow-y: auto;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-box {
            flex: 1;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #444;
        }

        .preview-box.light {
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%), linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e0e0e0 75%), linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .preview-box.dark {
            background-color: #1a1a1a;
            background-image: linear-gradient(45deg, #333333 25%, transparent 25%), linear-gradient(-45deg, #333333 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #333333 75%), linear-gradient(-45deg, transparent 75%, #333333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .projection-canvas {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            background: transparent;
        }

        #general {
            width: 100%;
            height: 100%;
            display: table;
        }

        #visible {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            font-family: "Arial";
            font-weight: bold;
            padding: 5%;
        }

        .control {
            margin-bottom: 12px;
        }

        .control label {
            display: block;
            font-size: 10px;
            color: #4ade80;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="color"],
        select,
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        select {
            background: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
        }

        .slider-val {
            float: right;
            color: #aaa;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #4ade80;
            border: 1px solid #333;
            padding: 15px;
            font-family: monospace;
            border-radius: 8px;
            resize: none;
        }

        #copyBtn {
            width: 100%;
            padding: 15px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        h3 {
            margin-bottom: 20px;
            font-size: 16px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h3>CONFIGURAÇÃO</h3>

        <div class="control">
            <label>Tema do Preview</label>
            <select id="previewTheme">
                <option value="dark">Escuro (Xadrez Preto)</option>
                <option value="light">Claro (Xadrez Branco)</option>
            </select>
        </div>

        <div class="control">
            <label>Cor do Texto</label>
            <input type="color" id="colorText" value="#ffffff">
        </div>

        <div class="control">
            <label>Fonte (Família)</label>
            <select id="fontFamilySelect">
                <option value="Arial">Arial</option>
                <option value="Segoe UI">Segoe UI</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Roboto">Roboto</option>
                <option value="Impact">Impact</option>
                <option value="custom">Outra (Google Fonts)...</option>
            </select>
        </div>

        <div class="control" id="customFontControl" style="display: none;">
            <label>Nome da Fonte (Google Fonts)</label>
            <input type="text" id="fontFamilyCustom" placeholder="Ex: Oswald, Open Sans...">
        </div>

        <div class="control">
            <label>Tamanho da Fonte <span class="slider-val" id="valFontSize">70px</span></label>
            <input type="range" id="fontSize" min="20" max="200" value="70">
        </div>

        <div class="control">
            <label>Altura da Linha <span class="slider-val" id="valLineHeight">1.2</span></label>
            <input type="range" id="lineHeight" min="0.8" max="2.5" step="0.1" value="1.2">
        </div>

        <div class="control">
            <label>Espaçamento das Letras <span class="slider-val" id="valLetterSpacing">0px</span></label>
            <input type="range" id="letterSpacing" min="-5" max="20" value="0">
        </div>

        <div class="control" style="display: flex; flex-direction: column; gap: 8px;">
            <label
                style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; color: #eee; font-size: 13px;">
                <input type="checkbox" id="btnCaps" style="width: auto;"> MAIÚSCULO
            </label>
            <label
                style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; color: #eee; font-size: 13px;">
                <input type="checkbox" id="btnBold" checked style="width: auto;"> Negrito
            </label>
            <label
                style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; color: #eee; font-size: 13px;">
                <input type="checkbox" id="btnItalic" style="width: auto;"> Itálico
            </label>
            <label
                style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; color: #eee; font-size: 13px;">
                <input type="checkbox" id="btnUnderline" style="width: auto;"> Sublinhado
            </label>
        </div>

        <button id="copyBtn">COPIAR CSS</button>
    </div>

    <div class="main">
        <div class="preview-box" id="preview-box">
            <style id="dynamic-style"></style>
            <div class="projection-canvas" id="projection-canvas">
                <div id="general">
                    <div id="visible">
                        <span>Grandes coisas fez o Senhor!</span>
                    </div>
                </div>
            </div>
        </div>

        <textarea id="cssOutput" readonly></textarea>
    </div>

    <script>
        const projectionCanvas = document.getElementById('projection-canvas');
        const previewBox = document.getElementById('preview-box');
        const previewTheme = document.getElementById('previewTheme');
        const styleTag = document.getElementById('dynamic-style');
        const cssOutput = document.getElementById('cssOutput');
        const googleFontLink = document.createElement('link');
        googleFontLink.rel = 'stylesheet';
        document.head.appendChild(googleFontLink);

        function scalePreview() {
            const scale = Math.min(previewBox.clientWidth / 1920, previewBox.clientHeight / 1080);
            projectionCanvas.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scalePreview);
        window.addEventListener('load', scalePreview);

        function update() {
            const colorText = document.getElementById('colorText').value;
            const fontSize = document.getElementById('fontSize').value;
            const fontSelect = document.getElementById('fontFamilySelect').value;
            const fontCustom = document.getElementById('fontFamilyCustom').value;
            const customControl = document.getElementById('customFontControl');

            let fontFamily = fontSelect;

            if (fontSelect === 'custom') {
                customControl.style.display = 'block';
                fontFamily = fontCustom || 'Arial';
            } else {
                customControl.style.display = 'none';
            }

            const lineHeight = document.getElementById('lineHeight').value;
            const letterSpacing = document.getElementById('letterSpacing').value;

            // Carregar Google Font dinamicamente se for customizada ou Montserrat/Roboto
            const fontsToLoad = ['Montserrat', 'Roboto', 'Oswald']; // Lista base
            if (fontSelect === 'custom' && fontCustom) {
                const fontUrl = `https://fonts.googleapis.com/css2?family=${fontCustom.replace(/ /g, '+')}:wght@400;700&display=swap`;
                googleFontLink.href = fontUrl;
            } else if (['Montserrat', 'Roboto'].includes(fontSelect)) {
                googleFontLink.href = `https://fonts.googleapis.com/css2?family=${fontSelect}:wght@400;700&display=swap`;
            }
            const isCaps = document.getElementById('btnCaps').checked;
            const isBold = document.getElementById('btnBold').checked;
            const isItalic = document.getElementById('btnItalic').checked;
            const isUnderline = document.getElementById('btnUnderline').checked;

            document.getElementById('valFontSize').innerText = fontSize + 'px';
            document.getElementById('valLineHeight').innerText = lineHeight;
            document.getElementById('valLetterSpacing').innerText = letterSpacing + 'px';

            previewBox.className = 'preview-box ' + previewTheme.value;

            let css = ``;

            // Gerar @import para OBS se for Google Font
            if (fontSelect === 'custom' && fontCustom) {
                css += `@import url('https://fonts.googleapis.com/css2?family=${fontCustom.replace(/ /g, '+')}:wght@400;700&display=swap');\n\n`;
            } else if (['Montserrat', 'Roboto'].includes(fontSelect)) {
                css += `@import url('https://fonts.googleapis.com/css2?family=${fontSelect}:wght@400;700&display=swap');\n\n`;
            }

            css += `/* CSS HOLYRICS MINIMALISTA */\n\n`;
            css += `#visible {\n`;
            css += `    font-family: '${fontFamily}';\n`;
            css += `    font-size: ${fontSize}px;\n`;
            css += `    line-height: ${lineHeight};\n`;
            css += `    letter-spacing: ${letterSpacing}px;\n`;
            css += `    color: ${colorText};\n`;
            if (isCaps) css += `    text-transform: uppercase;\n`;
            if (isBold) css += `    font-weight: bold;\n`;
            else css += `    font-weight: normal;\n`;
            if (isItalic) css += `    font-style: italic;\n`;
            if (isUnderline) css += `    text-decoration: underline;\n`;
            css += `}\n\n`;

            css += `.text-custom {\n`;
            css += `    color: ${colorText};\n`;
            css += `}\n`;

            styleTag.innerHTML = css;
            cssOutput.value = css;
        }

        document.querySelectorAll('input, select').forEach(i => i.addEventListener('input', update));
        previewTheme.addEventListener('change', update);

        document.getElementById('copyBtn').addEventListener('click', () => {
            cssOutput.select();
            document.execCommand('copy');
            const original = copyBtn.innerText;
            copyBtn.innerText = 'COPIADO!';
            setTimeout(() => copyBtn.innerText = original, 2000);
        });

        update();
        scalePreview();
    </script>
</body>

</html>
